<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجلة التصوير الفوتوغرافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfaf6;
            --accent-gold: #c9a55c;
            --primary-text: #2c3e50;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0; color: var(--primary-text);
        }

        /* --- واجهة الترحيب --- */
        .welcome-hero {
            height: 90vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('welcomehero.jpg');
            background-size: cover;
            background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }

        .welcome-hero h1 { font-family: 'Amiri', serif; font-size: 4rem; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .welcome-hero p { font-size: 1.8rem; color: var(--accent-gold); margin-top: 10px; font-weight: bold; }

        /* --- الأقسام --- */
        .project-section { padding: 60px 8%; position: relative; }
        
        .section-header {
            height: 250px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 20px; overflow: hidden; margin-bottom: 40px;
            position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .section-header img { width: 100%; height: 100%; object-fit: cover; position: absolute; filter: brightness(0.6); }
        .section-header h2 { position: relative; z-index: 2; color: white; font-family: 'Amiri', serif; font-size: 3.5rem; margin: 0; }

        /* --- الكروت --- */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; }

        .flip-card { width: 100%; height: 350px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }

        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: 15px; overflow: hidden; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .flip-card-front img, .flip-card-back img { width: 100%; height: 100%; object-fit: cover; }
        .flip-card-back { transform: rotateY(180deg); border: 2px solid var(--accent-gold); }

        /* --- نص المعلومة --- */
        .info-box {
            background: white; padding: 25px; border-radius: 15px; margin-top: 30px;
            border-right: 8px solid var(--accent-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 1.2rem; line-height: 1.8;
        }

        footer { text-align: center; padding: 40px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="welcome-hero">
        <h1>مجلة التصوير الفوتوغرافي</h1>
        <p>تحت إشراف: د/ داليا محمد & د/ جهاد محمد</p>
    </div>

    <div id="main-content"></div>

    <script>
        const projects = [
            { id: 'flower', name: 'النبات والورد', info: 'تعتبر الزهور لغة الطبيعة الصامتة التي تعبر عن الجمال والتجدد. في عالم التصوير، نركز على تفاصيل الـ Macro لإبراز التناغم اللوني.' },
            { id: 'animal', name: 'الحيوانات', info: 'اقتناص اللحظة العفوية في حياة الكائنات هو التحدي الأكبر، حيث يبرز الذكاء الاصطناعي الجانب الفني والتشكيلي لشخصية كل حيوان.' },
            { id: 'eid', name: 'أجواء العيد', info: 'فرحة الأطفال والبهجة في الألوان، قسم يجسد السعادة ويحولها إلى لوحات تشكيلية تنبض بالحياة.' },
            { id: 'monument', name: 'معالم أثرية', info: 'شموخ التاريخ في المعالم الكبرى، حيث تلتقي زوايا التصوير الهندسي مع مدارس الفن التكعيبي والتجريدي عبر الـ AI.' },
            { id: 'building', name: 'مباني أثرية', info: 'تفاصيل الحجر والنقوش في المباني القديمة تحكي قصصاً من الماضي، نبرزها هنا بأسلوب فني يدمج الواقع بالخيال.' },
            { id: 'boat', name: 'مراكب', info: 'انسيابية الحركة فوق الماء وانعكاسات الضوء، رحلة بصرية بين القوارب التقليدية ورؤية تشكيلية مبتكرة.' }
        ];

        const container = document.getElementById('main-content');

        projects.forEach(p => {
            let section = `
                <section class="project-section">
                    <div class="section-header">
                        <img src="${p.id}hero.jpg" alt="${p.name}">
                        <h2>${p.name}</h2>
                    </div>
                    <div class="cards-grid">
                        ${[1, 2, 3, 4].map(num => `
                            <div class="flip-card" onclick="this.classList.toggle('flipped')">
                                <div class="flip-card-inner">
                                    <div class="flip-card-front"><img src="${p.id}${num}.jpg"></div>
                                    <div class="flip-card-back"><img src="${p.id}${num}ai.jpg"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="info-box">${p.info}</div>
                </section>
            `;
            container.innerHTML += section;
        });
    </script>

    <footer>جميع الحقوق محفوظة - مشروع مادة التصوير الفوتوغرافي</footer>
</body>
</html>
