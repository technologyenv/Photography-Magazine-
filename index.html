<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yomna Essam | Photography Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --van-gogh-blue: #1b294b;
            --vintage-gold: #c9a55c;
            --paper-bg: #fdfaf6;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: var(--paper-bg);
            color: var(--van-gogh-blue);
            font-family: 'Amiri', serif;
            overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* واجهة الترحيب الكاملة بالتصميم المختار */
        .welcome-screen {
            width: 100%; height: 100vh;
            background: #e5d1b1;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .welcome-screen img { 
            width: 100%; height: 100%; 
            object-fit: contain; /* لضمان ظهور الصورة كاملة دون قص */
        }

        .hero {
            width: 100%; padding: 60px 20px;
            background: linear-gradient(rgba(27, 41, 75, 0.85), rgba(27, 41, 75, 0.85)), 
                        url('https://i.ibb.co/rGPGj46W/flowerhero.jpg') center/cover fixed;
            color: var(--vintage-gold); border-bottom: 5px double var(--vintage-gold);
            text-align: center;
        }
        .hero h1 { font-family: 'Aref Ruqaa', serif; font-size: 3.5rem; margin: 0; }

        .container { width: 90%; max-width: 1100px; margin: 0 auto; padding: 20px 0; }

        .section-header {
            margin: 50px 0 30px; position: relative; height: 250px;
            border-radius: 15px; overflow: hidden; border: 3px solid var(--vintage-gold);
        }
        .section-header img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
        .section-header h2 {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--vintage-gold); font-size: 2.8rem; font-family: 'Aref Ruqaa', serif;
        }

        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        
        .flip-card { height: 500px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 8px;
            border: 10px solid #fff; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            background: #fff; display: flex; flex-direction: column;
        }
        .card-back { transform: rotateY(180deg); border-color: var(--van-gogh-blue); }

        .card-face img { width: 100%; height: 80%; object-fit: contain; background: #f9f9f9; }
        
        .label {
            height: 20%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--van-gogh-blue); color: var(--vintage-gold); padding: 5px; text-align: center;
        }
        .label .school-info { font-size: 0.9rem; color: #fff; margin-top: 3px; line-height: 1.2; }

        .desc-text {
            background: #fff; padding: 20px; margin: 20px 0 40px;
            border-right: 6px solid var(--vintage-gold); font-size: 1.2rem;
        }

        .footer-section {
            width: 100%; background: var(--van-gogh-blue); color: #fff;
            padding: 60px 20px; text-align: center; border-top: 5px solid var(--vintage-gold);
        }
        .profile-circle {
            width: 220px; height: 220px; border-radius: 50%;
            border: 5px solid var(--vintage-gold); object-fit: cover;
            margin: 0 auto 20px; display: block;
        }
        .yomna-title { font-size: 2.5rem; color: var(--vintage-gold); }

        footer { background: #070d1a; color: #666; padding: 15px; width: 100%; text-align: center; }
    </style>
</head>
<body onclick="document.getElementById('m').play()">

    <audio id="m" loop autoplay><source src="calm.mp3"></audio>

    <div class="welcome-screen">
        <img src="https://i.ibb.co/3ykG6C28/2026.jpg" alt="Starry Journal Welcome Image">
    </div>

    <div class="hero">
        <h1>مجلة التصوير الفوتوغرافي</h1>
        <p>إشراف: د/ داليا محمد & د/ جهاد محمد</p>
    </div>

    <div class="container" id="content"></div>

    <div class="footer-section">
        <img src="https://i.ibb.co/WN8WV46J/IMG-20260422-135713.jpg" class="profile-circle" alt="Yomna Essam">
        <div class="yomna-title">Yomna Essam</div>
        <div class="thanks">
            Thank you for exploring my creative vision through this journal.<br>
            It was a journey of blending reality with the magic of AI art.
        </div>
    </div>

    <footer>© 2026 Yomna Essam - Faculty of Specific Education</footer>

                sch: [

                    'الرومانسية (Romanticism) <br> الرائد: أوجين ديلاكروا'

            {

                caps: ['نظرة بريئة', 'ذكاء الطبيعة', 'جمال وحشي', 'هدوء'],
                imgs: ['https://i.ibb.co/j9tfsY8k/animal1.jpg', 'https://i.ibb.co/Df1crzGm/animal2.jpg', 'https://i.ibb.co/b5bdWzNS/animal3.jpg', 'https://i.ibb.co/WN8WV46J/IMG-20260422-135713.jpg'], 
                ai: ['https://i.ibb.co/8DSjsnNj/animal1ai.png', 'https://i.ibb.co/p6L5vmJ3/animal2ai.png', 'https://i.ibb.co/QF0HCjgn/animal3ai.png', 'https://i.ibb.co/Q35bVQ9Z/animal4ai.png'],

                    'الوحشية (Fauvism) <br> الرائد: هنري ماتيس',

                    'الرومانسية (Romanticism) <br> الرائد: أوجين ديلاكروا'
                ]
            }
        ];

        const c = document.getElementById('content');
        data.forEach(p => {
            c.innerHTML += `
                <div class="section-header"><img src="${p.h}" loading="lazy"><h2>${p.t}</h2></div>
                <div class="gallery">
                    ${[0,1,2,3].map(i => `
                        <div class="flip-card" onclick="this.classList.toggle('flipped')">
                            <div class="flip-card-inner">
                                <div class="card-face"><img src="${p.imgs[i]}" loading="lazy"><div class="label">✨ ${p.caps[i]}</div></div>
                                <div class="card-face card-back"><img src="${p.ai[i]}" loading="lazy"><div class="label"><div class="school-info">${p.sch[i]}</div></div></div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="desc-text">${p.info}</div>
            `;
        });
    </script>
</body>
</html>
