<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yomna Essam | Photography Magazine</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --van-gogh-blue: #1b294b;
            --vintage-gold: #c9a55c;
            --paper-bg: #fdfaf6;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body {
            margin: 0; padding: 0;
            background: var(--paper-bg);
            color: var(--van-gogh-blue);
            font-family: 'Amiri', serif;
            display: flex; flex-direction: column; align-items: center;
        }

        /* واجهة الترحيب */
        .welcome-screen {
            width: 100%; height: 100vh;
            background: #e5d1b1;
            display: flex; align-items: center; justify-content: center;
        }
        .welcome-screen img { width: 100%; height: 100%; object-fit: contain; }

        /* الهيرو المطور (خلفية Blurry) */
        .hero {
            width: 100%; min-height: 450px;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border-bottom: 5px double var(--vintage-gold);
        }
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.ibb.co/v6S74k1j/1776860493796.png') center/cover no-repeat;
            opacity: 0.35; filter: blur(4px); z-index: 1;
        }
        .hero-content {
            position: relative; z-index: 2; text-align: center;
            background: rgba(27, 41, 75, 0.7); padding: 50px; border-radius: 15px;
            color: var(--vintage-gold); backdrop-filter: blur(3px);
        }
        .hero h1 { font-family: 'Aref Ruqaa', serif; font-size: clamp(2.5rem, 8vw, 4rem); margin: 0; }
        .hero p { font-size: 1.8rem; color: #fff; margin-top: 10px; }

        /* حاوية الأقسام الطولية */
        .section-wrapper {
            width: 100%; padding: 60px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .section-title-box {
            text-align: center; margin-bottom: 40px;
            border-bottom: 2px solid var(--vintage-gold); padding-bottom: 10px;
        }
        .section-title-box h2 { font-family: 'Aref Ruqaa', serif; font-size: 3rem; margin: 0; }

        /* الجريد المطور للكروت */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px; width: 95%; max-width: 1300px;
        }

        .flip-card { height: 480px; perspective: 1000px; cursor: pointer; position: relative; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }

        /* علامة صباح / Flip Hint */
        .flip-hint {
            position: absolute; top: 15px; right: 15px;
            background: rgba(201, 165, 92, 0.9); color: white;
            width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; z-index: 10; animation: bounce 2s infinite;
        }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 12px;
            border: 10px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            background: #fff; overflow: hidden;
        }
        .card-back { transform: rotateY(180deg); border-color: var(--van-gogh-blue); }
        .card-face img { width: 100%; height: 80%; object-fit: contain; background: #fdfdfd; }

        .card-info {
            height: 20%; background: var(--van-gogh-blue); color: var(--vintage-gold);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 5px;
        }
        .card-info span { font-size: 0.85rem; color: #eee; margin-top: 2px; }

        .section-desc {
            max-width: 900px; margin-top: 40px; padding: 25px;
            background: #fff; border-right: 8px solid var(--vintage-gold);
            font-size: 1.3rem; line-height: 1.6; text-align: justify;
        }

        /* الفوتر وصورة البروفايل */
        .footer-wrap {
            width: 100%; background: var(--van-gogh-blue); color: #fff;
            padding: 80px 20px; text-align: center; border-top: 5px solid var(--vintage-gold);
        }
        .profile-img {
            width: 240px; height: 240px; border-radius: 50%;
            border: 6px solid var(--vintage-gold); object-fit: cover;
            margin: 0 auto 30px; display: block;
        }
        .yomna-name { font-size: 3rem; color: var(--vintage-gold); font-family: 'Playfair Display', serif; }

        footer { background: #070d1a; color: #777; padding: 20px; width: 100%; text-align: center; }
    </style>
</head>
