<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yomna Essam | Photography Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --van-gogh-blue: #1b294b;
            --vintage-gold: #c9a55c;
            --paper-bg: #fdfaf6;
        }

        /* تسريع الأداء */
        * { box-sizing: border-box; scroll-behavior: smooth; }
        
        body {
            margin: 0; padding: 0;
            background: var(--paper-bg);
            color: var(--van-gogh-blue);
            font-family: 'Amiri', serif;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* واجهة الترحيب الكاملة */
        .welcome-screen {
            width: 100%; height: 100vh;
            background: #e5d1b1;
            display: flex; align-items: center; justify-content: center;
        }
        .welcome-screen img { 
            width: 100%; height: 100%; 
            object-fit: contain; 
        }

        /* قسم الهيرو المطور بخلفية Blurry */
        .hero {
            width: 100%; min-height: 400px;
            position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--vintage-gold);
            text-align: center;
            overflow: hidden;
            border-bottom: 5px double var(--vintage-gold);
        }

        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.ibb.co/v6S74k1j/1776860493796.png') center/cover no-repeat;
            opacity: 0.4; /* تقليل الشفافية كما طلبتِ */
            filter: blur(5px); /* تأثير الضبابية */
            z-index: 1;
        }

        .hero-content {
            position: relative; z-index: 2;
            background: rgba(27, 41, 75, 0.6); /* طبقة خفيفة لبروز الخط */
            padding: 40px; border-radius: 20px;
            backdrop-filter: blur(2px);
        }

        .hero h1 { font-family: 'Aref Ruqaa', serif; font-size: clamp(2.5rem, 8vw, 4rem); margin: 0 0 15px 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .hero p { font-size: 1.8rem; margin: 0; font-weight: bold; color: #fff; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }

        .container { width: 92%; max-width: 1150px; margin: 0 auto; padding: 20px 0; }

        /* تنسيق الفريمات الموحدة السريعة */
        .section-header {
            margin: 60px 0 30px; position: relative; height: 280px;
            border-radius: 15px; overflow: hidden; border: 3px solid var(--vintage-gold);
        }
        .section-header img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
        .section-header h2 {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--vintage-gold); font-size: 3rem; font-family: 'Aref Ruqaa', serif; margin: 0;
        }

        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 35px; }
        
        .flip-card { height: 520px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s ease-out; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 10px;
            border: 12px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background: #fff; display: flex; flex-direction: column;
        }
        .card-back { transform: rotateY(180deg); border-color: var(--van-gogh-blue); }
        .card-face img { width: 100%; height: 82%; object-fit: contain; background: #fafafa; }
        
        .label {
            height: 18%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--van-gogh-blue); color: var(--vintage-gold); padding: 5px; text-align: center;
        }
        .school-info { font-size: 0.95rem; color: #fff; margin-top: 4px; line-height: 1.3; }

        .desc-text {
            background: #fff; padding: 25px; margin: 25px 0 50px;
            border-right: 8px solid var(--vintage-gold); font-size: 1.3rem; line-height: 1.6;
        }

        /* الخاتمة وصورة الدائرة */
        .footer-section {
            width: 100%; background: var(--van-gogh-blue); color: #fff;
            padding: 70px 20px; text-align: center; border-top: 5px solid var(--vintage-gold);
        }
        .profile-circle {
            width: 240px; height: 240px; border-radius: 50%;
            border: 6px solid var(--vintage-gold); object-fit: cover;
            margin: 0 auto 25px; display: block; box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }
        .yomna-title { font-size: 2.8rem; color: var(--vintage-gold); font-family: 'Playfair Display', serif; }

        footer { background: #070d1a; color: #777; padding: 20px; width: 100%; text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body onclick="document.getElementById('m').play()">

</body>
</html>
