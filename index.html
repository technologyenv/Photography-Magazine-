<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yomna Essam | Photography Magazine</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --van-gogh-blue: #1b294b;
            --vintage-gold: #c9a55c;
            --paper-bg: #fdfaf6;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        
        body {
            margin: 0; padding: 0;
            background: var(--paper-bg);
            color: var(--van-gogh-blue);
            font-family: 'Amiri', serif;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* 1. واجهة الترحيب الكاملة */
        .welcome-screen {
            width: 100%; height: 100vh;
            background: #e5d1b1;
            display: flex; align-items: center; justify-content: center;
        }
        .welcome-screen img { width: 100%; height: 100%; object-fit: contain; }

        /* 2. قسم الهيرو (العنوان والإشراف بخلفية Blurry) */
        .hero {
            width: 100%; min-height: 450px;
            position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; border-bottom: 5px double var(--vintage-gold);
        }
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.ibb.co/v6S74k1j/1776860493796.png') center/cover no-repeat;
            opacity: 0.3; filter: blur(6px); z-index: 1;
        }
        .hero-content {
            position: relative; z-index: 2; text-align: center;
            background: rgba(27, 41, 75, 0.7); padding: 50px; border-radius: 25px;
            color: var(--vintage-gold); backdrop-filter: blur(4px);
        }
        .hero h1 { font-family: 'Aref Ruqaa', serif; font-size: clamp(2.5rem, 8vw, 4rem); margin: 0; }
        .hero p { font-size: 1.8rem; color: #fff; margin-top: 15px; font-weight: bold; }

        /* 3. حاوية الأقسام الطولية الكاملة */
        .full-section {
            width: 100%; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 60px 20px; border-bottom: 2px solid #ddd;
        }

        .section-title {
            text-align: center; margin-bottom: 40px;
            border-bottom: 3px solid var(--vintage-gold); padding-bottom: 10px;
        }
        .section-title h2 { font-family: 'Aref Ruqaa', serif; font-size: 3.2rem; margin: 0; }

        /* 4. شبكة الكروت (4 بجانب بعض) */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px; width: 95%; max-width: 1300px;
            justify-items: center;
        }

        .flip-card { 
            width: 100%; height: 500px; 
            perspective: 1000px; cursor: pointer; position: relative; 
        }
        .flip-card-inner { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; 
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }

        /* علامة صباح (Flip Hint) */
        .flip-hint {
            position: absolute; top: 15px; right: 15px;
            background: var(--vintage-gold); color: white;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; z-index: 5;
            animation: bounce 2s infinite; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 15px;
            border: 12px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: #fff; overflow: hidden;
        }
        .card-back { transform: rotateY(180deg); border-color: var(--van-gogh-blue); }
        
        .card-face img { width: 100%; height: 80%; object-fit: contain; background: #fafafa; }

        .card-label {
            height: 20%; background: var(--van-gogh-blue); color: var(--vintage-gold);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 10px;
        }
        .card-label .school-tag { font-size: 0.9rem; color: #fff; margin-top: 5px; line-height: 1.2; }

        .section-info-text {
            max-width: 1000px; margin-top: 50px; padding: 30px;
            background: #fff; border-right: 10px solid var(--vintage-gold);
            font-size: 1.4rem; line-height: 1.7; text-align: justify;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
        }

        /* 5. الخاتمة */
        .final-footer {
            width: 100%; background: var(--van-gogh-blue); color: #fff;
            padding: 80px 20px; text-align: center; border-top: 8px solid var(--vintage-gold);
        }
        .profile-pic {
            width: 250px; height: 250px; border-radius: 50%;
            border: 8px solid var(--vintage-gold); object-fit: cover;
            margin: 0 auto 30px; display: block; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .yomna-name { font-size: 3.5rem; color: var(--vintage-gold); font-family: 'Playfair Display', serif; }

        footer { background: #070d1a; color: #888; padding: 25px; width: 100%; text-align: center; }
    </style>
</head>
