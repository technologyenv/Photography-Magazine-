<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yomna Essam | Photography Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --van-gogh-blue: #1b294b;
            --vintage-gold: #c9a55c;
            --paper-bg: #fdfaf6;
        }

        /* تسريع الأداء */
        * { box-sizing: border-box; scroll-behavior: smooth; }
        
        body {
            margin: 0; padding: 0;
            background: var(--paper-bg);
            color: var(--van-gogh-blue);
            font-family: 'Amiri', serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* واجهة الترحيب الكاملة المحسنة */
        .welcome-screen {
            width: 100%; height: 100vh;
            background: url('https://i.ibb.co/v6S74k1j/1776860493796.png') center/cover no-repeat;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
            opacity: 0.85;
        }
        .welcome-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(27, 41, 75, 0.4); backdrop-filter: blur(2px);
        }
        .welcome-content {
            position: relative; z-index: 2; text-align: center; color: #fff;
            animation: fadeInUp 1.5s ease-out;
        }
        .welcome-content h1 { 
            font-family: 'Aref Ruqaa', serif; 
            font-size: clamp(3rem, 10vw, 5rem); 
            margin: 0 0 20px 0; 
            text-shadow: 3px 3px 15px rgba(0,0,0,0.7);
        }
        .welcome-content p { 
            font-size: clamp(1.5rem, 4vw, 2.2rem); 
            margin: 0; 
            font-weight: 700;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
        }

        /* تعليمات الفليب */
        .flip-hint {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: rgba(201, 165, 92, 0.95); color: var(--van-gogh-blue);
            padding: 15px 25px; border-radius: 50px; font-weight: 700;
            font-size: 1.1rem; box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            animation: slideIn 0.8s ease-out, pulse 2s infinite;
            cursor: pointer; transition: all 0.3s ease;
        }
        .flip-hint:hover { transform: scale(1.05); }
        .flip-icon { font-size: 1.5rem; margin-left: 10px; animation: rotate 2s infinite linear; }

        /* القسم الهيرو الجديد */
        .hero-section {
            width: 100%; position: relative; margin-bottom: 40px;
        }
        .hero-section img.hero-bg {
            width: 100%; height: 60vh; object-fit: cover;
            filter: brightness(0.6) blur(1px);
        }
        .hero-title {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--vintage-gold); font-family: 'Aref Ruqaa', serif;
            font-size: clamp(3rem, 8vw, 5rem); text-align: center;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.8); z-index: 2;
            background: rgba(27, 41, 75, 0.7); padding: 20px 40px; border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .container { width: 95%; max-width: 1400px; margin: 0 auto; padding: 0 20px; }

        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            margin: 40px 0; 
        }
        
        .flip-card { 
            height: 450px; 
            perspective: 1200px; 
            cursor: pointer; 
            position: relative;
        }
        .flip-card-inner { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            transform-style: preserve-3d; 
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            border: 15px solid #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            background: #fff; display: flex; flex-direction: column;
            overflow: hidden;
        }
        .card-back { transform: rotateY(180deg); border-color: var(--vintage-gold); }
        .card-face img { 
            width: 100%; height: 78%; 
            object-fit: cover; 
            transition: transform 0.3s ease;
        }
        .flip-card:hover .card-face img { transform: scale(1.05); }
        
        .label {
            height: 22%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--van-gogh-blue), #2d3b5f);
            color: var(--vintage-gold); padding: 20px; text-align: center;
            font-weight: 700; font-size: 1.1rem;
        }
        .school-info { 
            font-size: 0.85rem; 
            color: rgba(255,255,255,0.9); 
            margin-top: 8px; 
            line-height: 1.4; 
            font-family: 'Amiri', serif;
        }

        /* النص الوصفي */
        .desc-text {
            background: linear-gradient(135deg, #fff 0%, #f8f4ed 100%);
            padding: 40px; margin: 60px 0;
            border-right: 10px solid var(--vintage-gold);
            border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            font-size: 1.4rem; line-height: 1.8; text-align: center;
            position: relative;
        }
        .desc-text::before {
            content: '✨'; position: absolute; top: -20px; right: 50px;
            font-size: 2rem; background: var(--vintage-gold); 
            width: 40px; height: 40px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
        }

        /* الخاتمة المحسنة */
        .footer-section {
            width: 100%; 
            background: linear-gradient(135deg, var(--van-gogh-blue), #0f1a36);
            color: #fff; padding: 100px 20px; text-align: center;
            position: relative; overflow: hidden;
        }
        .footer-section::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(201,165,92,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(201,165,92,0.1) 0%, transparent 50%);
        }
        .footer-content { position: relative; z-index: 2; }
        .profile-frame {
            width: 280px; height: 280px; margin: 0 auto 40px;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .profile-circle {
            width: 240px; height: 240px; border-radius: 50%;
            border: 8px solid var(--vintage-gold); object-fit: cover;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), inset 0 0 20px rgba(255,255,255,0.2);
            transition: transform 0.5s ease, box-shadow 0.5s ease;
        }
        .profile-frame:hover .profile-circle {
            transform: scale(1.05); box-shadow: 0 35px 70px rgba(201,165,92,0.4);
        }
        .yomna-title { 
            font-size: 3.5rem; 
            color: var(--vintage-gold); 
            font-family: 'Playfair Display', serif; 
            margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .thanks {
            font-size: 1.4rem; 
            font-style: italic; 
            max-width: 800px; 
            margin: 0 auto;
            background: rgba(255,255,255,0.1); 
            padding: 30px; 
            border-radius: 20px;
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.2);
        }

        footer { 
            background: #0a0f1e; 
            color: #aaa; 
            padding: 25px; 
            width: 100%; 
            text-align: center; 
            font-size: 1rem; 
            font-family: 'Amiri', serif;
        }

        /* التحسينات والأنيميشن */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* تحسين السرعة */
        img { loading: lazy; }
        .flip-card, .hero-section { will-change: transform; }
    </style>
</head>
