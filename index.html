<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجلة التصوير الفوتوغرافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfaf6;
            --accent-gold: #c9a55c;
            --primary-text: #2c3e50;
            --card-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0; color: var(--primary-text);
            overflow-x: hidden;
        }

        /* --- الموسيقى --- */
        #music-control {
            position: fixed; bottom: 20px; left: 20px; z-index: 1000;
            background: var(--accent-gold); color: white; border: none;
            padding: 10px 15px; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* --- واجهة الترحيب --- */
        .welcome-hero {
            height: 90vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('welcomehero.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }

        .welcome-hero h1 { font-family: 'Amiri', serif; font-size: 4.5rem; margin: 0; text-shadow: 3px 3px 15px rgba(0,0,0,0.6); }
        .welcome-hero p { font-size: 1.8rem; color: var(--accent-gold); margin-top: 15px; font-weight: bold; }

        /* --- الأقسام --- */
        .project-section { padding: 80px 8%; position: relative; }
        
        .section-header {
            height: 280px; display: flex; align-items: center; justify-content: center;
            border-radius: 25px; overflow: hidden; margin-bottom: 50px;
            position: relative; box-shadow: var(--card-shadow);
        }

        .section-header img { width: 100%; height: 100%; object-fit: cover; position: absolute; filter: brightness(0.5); }
        .section-header h2 { position: relative; z-index: 2; color: white; font-family: 'Amiri', serif; font-size: 3.8rem; margin: 0; letter-spacing: 2px; }

        /* --- الكروت --- */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 30px; }

        .flip-card { width: 100%; height: 450px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }

        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: 20px; overflow: hidden; box-shadow: var(--card-shadow);
            background: white; display: flex; flex-direction: column;
        }

        .flip-card-front img, .flip-card-back img { width: 100%; height: 85%; object-fit: cover; }
        
        /* تزيين تحت الصورة الأصلية */
        .front-caption {
            height: 15%; display: flex; align-items: center; justify-content: center;
            background: #fff; font-style: italic; color: #7f8c8d; font-size: 0.95rem;
        }

        /* تزيين تحت صورة AI */
        .back-info {
            height: 15%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--accent-gold); color: white; padding: 5px;
        }
        .back-info .school { font-weight: bold; font-size: 0.9rem; }
        .back-info .artist { font-size: 0.8rem; opacity: 0.9; }

        .flip-card-back { transform: rotateY(180deg); border: 2px solid var(--accent-gold); }

        .info-box {
            background: white; padding: 30px; border-radius: 20px; margin-top: 40px;
            border-right: 10px solid var(--accent-gold); box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            font-size: 1.3rem; line-height: 1.8;
        }

        footer { text-align: center; padding: 50px; color: #888; font-size: 1rem; background: #f4f4f4; margin-top: 50px; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="calm.mp3" type="audio/mpeg">
    </audio>
    <button id="music-control" onclick="toggleMusic()">🎵 تشغيل الموسيقى</button>

    <div class="welcome-hero">
        <h1>مجلة التصوير الفوتوغرافي</h1>
        <p>تحت إشراف: د/ داليا محمد & د/ جهاد محمد</p>
    </div>

    <div id="main-content"></div>

    <script>
        function toggleMusic() {
            const music = document.getElementById('bgMusic');
            const btn = document.getElementById('music-control');
            if (music.paused) {
                music.play();
                btn.innerText = "🔇 إيقاف الموسيقى";
            } else {
                music.pause();
                btn.innerText = "🎵 تشغيل الموسيقى";
            }
        }

        const projects = [
            { 
                id: 'flower', name: 'النبات والورد', info: 'تعتبر الزهور لغة الطبيعة الصامتة التي تعبر عن الجمال والتجدد. نبرز هنا سحر الطبيعة بين الواقع والخيال.',
                captions: ['همس الطبيعة', 'عناق الألوان', 'تفتُّح الحياة', 'ندى الصباح'],
                schools: [
                    {s: 'Post-Impressionism', r: 'Vincent Van Gogh'},
                    {s: 'Romanticism School', r: 'Eugène Delacroix'},
                    {s: 'Post-Impressionism', r: 'Vincent Van Gogh'},
                    {s: 'Romanticism School', r: 'Eugène Delacroix'}
                ]
            },
            { 
                id: 'buildings', name: 'مباني أثرية', info: 'تفاصيل الحجر والنقوش في المباني القديمة تحكي قصصاً من الماضي، نبرزها هنا بأسلوب فني يدمج الواقع بالخيال.',
                captions: ['عبق الماضي', 'شموخ الجدران', 'حكاية حجر', 'تراث خالد'],
                schools: [
                    {s: 'Post-Impressionism', r: 'Vincent Van Gogh'},
                    {s: 'Romanticism School', r: 'Eugène Delacroix'},
                    {s: 'Romanticism School', r: 'Eugène Delacroix'},
                    {s: 'Post-Impressionism', r: 'Vincent Van Gogh'}
                ]
            },
            { 
                id: 'sites', name: 'معالم أثرية', info: 'شموخ التاريخ في المعالم الكبرى، حيث تلتقي زوايا التصوير الهندسي مع مدارس الفن العالمي عبر الـ AI.',
                captions: ['عظمة الأثر', 'روح المكان', 'بصمة التاريخ', 'خلود الزمان'],
                schools: [
                    {s: 'Surrealism School', r: 'Salvador Dali'},
                    {s: 'Romanticism School', r: 'Eugène Delacroix'},
                    {s: 'Romanticism School', r: 'Eugène Delacroix'},
                    {s: 'Romanticism School', r: 'Eugène Delacroix'}
                ]
            },
            { 
                id: 'animal', name: 'الحيوانات', info: 'اقتناص اللحظة العفوية هو التحدي الأكبر، حيث يبرز الذكاء الاصطناعي الجانب الفني لكل كائن.',
                captions: ['نظرة بريئة', 'ذكاء الطبيعة', 'جمال وحشي', 'وفاء صامت'],
                schools: [
                    {s: 'Fauvism School', r: 'Henri Matisse'},
                    {s: 'Surrealism School', r: 'Salvador Dali'},
                    {s: 'Fauvism School', r: 'Henri Matisse'},
                    {s: 'Romanticism School', r: 'Eugène Delacroix'}
                ]
            },
            { 
                id: 'boat', name: 'مراكب', info: 'انسيابية الحركة فوق الماء وانعكاسات الضوء، رحلة بصرية بين القوارب التقليدية ورؤية تشكيلية مبتكرة.',
                captions: ['هدوء البحر', 'أشرعة الأمل', 'انعكاس الضوء', 'رحلة المدى'],
                schools: [
                    {s: 'Romanticism School', r: 'Eugène Delacroix'},
                    {s: 'Romanticism School', r: 'Eugène Delacroix'},
                    {s: 'Impressionism School', r: 'Claude Monet'},
                    {s: 'Post-Impressionism', r: 'Vincent Van Gogh'}
                ]
            },
            { 
                id: 'eid', name: 'أجواء العيد', info: 'فرحة الأطفال والبهجة في الألوان، قسم يجسد السعادة ويحولها إلى لوحات تنبض بالحياة.',
                captions: ['بهجة العيد', 'ضحكة طفل', 'ألوان الفرح', 'روح الاحتفال'],
                schools: [
                    {s: 'Romanticism School', r: 'Eugène Delacroix'},
                    {s: 'Post-Impressionism', r: 'Vincent Van Gogh'},
                    {s: 'Post-Impressionism', r: 'Vincent Van Gogh'},
                    {s: 'Romanticism School', r: 'Eugène Delacroix'}
                ]
            }
        ];

        const container = document.getElementById('main-content');

        projects.forEach(p => {
            let section = `
                <section class="project-section">
                    <div class="section-header">
                        <img src="${p.id}hero.jpg" alt="${p.name}">
                        <h2>${p.name}</h2>
                    </div>
                    <div class="cards-grid">
                        ${[1, 2, 3, 4].map((num, index) => `
                            <div class="flip-card" onclick="this.classList.toggle('flipped')">
                                <div class="flip-card-inner">
                                    <div class="flip-card-front">
                                        <img src="${p.id}${num}.jpg">
                                        <div class="front-caption">✨ ${p.captions[index]}</div>
                                    </div>
                                    <div class="flip-card-back">
                                        <img src="${p.id}${num}ai.jpg">
                                        <div class="back-info">
                                            <span class="school">${p.schools[index].s}</span>
                                            <span class="artist">By: ${p.schools[index].r}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="info-box">${p.info}</div>
                </section>
            `;
            container.innerHTML += section;
        });
    </script>

    <footer>جميع الحقوق محفوظة - مشروع مادة التصوير الفوتوغرافي 2026</footer>
</body>
</html>
